plugins {
    id 'com.android.application'
}

android {
    namespace 'com.ragavidya.app'
    compileSdk 34

    defaultConfig {
        applicationId "com.ragavidya.app"
        minSdk 24          // Android 7.0 — covers ~99% of active devices
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            applicationIdSuffix ".debug"
            debuggable true
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    // No external dependencies — everything is in the HTML file
}
